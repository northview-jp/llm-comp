# llm-comp.yaml
# Edit this file to customize the behavior.

app:
  title: "llm-comp"
  system: |
    You are a helpful assistant.
  timeout_ms: 60000

providers:
  openai:
    enabled: true
    model: ["gpt-5-mini", "gpt-5-nano"]
    temperature: 0.2
    max_output_tokens: 800

  claude:
    enabled: true
    model: ["claude-haiku-4-5-20251001", "claude-sonnet-4-6"]
    temperature: 0.2
    max_output_tokens: 800

  gemini:
    enabled: true
    model: ["gemini-3.1-flash-lite-preview", "gemini-3-flash-preview"]
    temperature: 0.2
    max_output_tokens: 800

ui:
  mode: "tabbed" # tabbed | json
  tab_labels:
    openai: "OpenAI"
    claude: "Claude"
    gemini: "Gemini"
